<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STS Synergy{% if title %} · {{ title }}{% endif %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="https://cdn.plot.ly/plotly-2.35.0.min.js" charset="utf-8"></script>
</head>
<body data-active="{{ active }}">

<nav class="navbar">
  <a class="nav-brand" href="/">STS Synergy</a>
  <div class="nav-links">
    <a href="{{ url_for('analyze') }}"       class="nav-link {% if active=='analyze' %}active{% endif %}">Analyze</a>
    <a href="{{ url_for('compare') }}"       class="nav-link {% if active=='compare' %}active{% endif %}">Compare</a>
    <a href="{{ url_for('browse') }}"        class="nav-link {% if active=='browse'  %}active{% endif %}">Browse</a>
    <a href="{{ url_for('annotate_page') }}" class="nav-link {% if active=='annotate'%}active{% endif %}">Annotate</a>
  </div>
</nav>

<div class="page-wrap">
  {% block content %}{% endblock %}
</div>

<!-- Toast notification -->
<div id="toast" class="toast" role="alert"></div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
